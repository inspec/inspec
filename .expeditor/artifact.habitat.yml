---
expeditor:
  defaults:
    buildkite:
      timeout_in_minutes: 30
      retry:
        automatic:
          limit: 1

steps:

  - label: ":linux: Validate Habitat Builds of Chef InSpec"
    commands:
      - .expeditor/buildkite/artifact.habitat.test.sh
    expeditor:
      executor:
        docker:
          image: ruby:3.4.2-bullseye
          privileged: true
          environment:
            - HAB_AUTH_TOKEN

  - label: ":linux: Arm64 Validate Habitat Builds of Chef InSpec"
    commands:
      - .expeditor/buildkite/artifact.habitat.test.sh
    agents:
      queue: default-privileged-aarch64
    plugins:
      - docker#v3.5.0:
          image: ruby:3.4.2-bullseye
          privileged: true
          propagate-environment: true
          environment:
            - HAB_AUTH_TOKEN
            - BUILD_PKG_TARGET: "aarch64-linux"

  - label: ":windows: Validate Habitat Builds of Chef InSpec"
    commands:
      - .expeditor/buildkite/artifact.habitat.test.ps1
    expeditor:
      executor:
        windows:
          privileged: true
          environment:
            - HAB_AUTH_TOKEN
