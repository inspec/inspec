name: Test LTS-2024 Habitat Package Artifacts on PR
on:
  pull_request:
  workflow_dispatch:

jobs:
  test-macos-arm:
    name: ":darwin: Arm64 Validate Habitat Builds of Chef InSpec"
    runs-on: macos-15
    env:
      CHEF_LICENSE: accept-no-persist
      HAB_LICENSE: accept-no-persist
      HAB_NONINTERACTIVE: "true"
      HAB_NOCOLORING: "true"
      HAB_STUDIO_SECRET_HAB_NONINTERACTIVE: "true"
      HAB_REFRESH_CHANNEL: base-2025
      BUILD_PKG_TARGET: aarch64-darwin
      HAB_ORIGIN: ci
      HAB_AUTH_TOKEN: ${{ secrets.HAB_AUTH_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: System details
        run: uname -a

      - name: Install Habitat
        run: curl https://raw.githubusercontent.com/habitat-sh/habitat/main/components/hab/install.sh | bash

      - name: Generate and import origin key
        run: |
          hab origin key generate $HAB_ORIGIN
          HAB_CI_KEY=$(ls /hab/cache/keys/${HAB_ORIGIN}*.pub 2>/dev/null | head -1 \
            || ls ~/.hab/cache/keys/${HAB_ORIGIN}*.pub 2>/dev/null | head -1)
          if [ -f "$HAB_CI_KEY" ]; then
            hab origin key import < "$HAB_CI_KEY"
          else
            echo "Origin key not found in /hab/cache/keys or ~/.hab/cache/keys"
            ls /hab/cache/keys/ 2>/dev/null || true
            ls ~/.hab/cache/keys/ 2>/dev/null || true
            exit 1
          fi

      - name: Build Habitat package
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          DO_CHECK=true hab pkg build .

      - name: Install built package
        run: |
          source ./results/last_build.env
          hab pkg install -b "./results/${pkg_artifact}"

      - name: Run artifact tests
        run: |
          source ./results/last_build.env
          export PATH="$(hab pkg path ci/inspec)/bin:$PATH"
          cd test/artifact
          rake