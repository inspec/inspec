name: Promote Habitat Packages to LTS-2024 Channel

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of the build workflow that created the packages'
        required: true
        type: string

env:
  BLDR_URL: 'https://bldr.habitat.sh/'
  HAB_ORIGIN: 'chef'
  HAB_AUTH_TOKEN: ${{ secrets.HAB_AUTH_TOKEN }}
  HABITAT_VERSION: 'latest'
  CHEF_LICENSE: "accept-no-persist"
  HAB_LICENSE: "accept-no-persist"
  HAB_NONINTERACTIVE: "true"

permissions:
  contents: write
  actions: read

jobs:
  promote-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux Build Metadata
        uses: actions/download-artifact@v4
        with:
          name: habitat-build-metadata-linux
          path: metadata-linux
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Windows Build Metadata
        uses: actions/download-artifact@v4
        with:
          name: habitat-build-metadata-windows
          path: metadata-windows
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Habitat
        shell: bash
        env:
          HAB_AUTH_TOKEN: ${{ secrets.HAB_AUTH_TOKEN }}
        run: |
          echo "--- Installing Habitat on Linux with version: $HABITAT_VERSION"
          curl https://raw.githubusercontent.com/habitat-sh/habitat/master/components/hab/install.sh | sudo -E bash -s -- -v "$HABITAT_VERSION" -t "x86_64-linux"

      - name: Promote Linux Package to LTS-2024
        shell: bash
        run: |
          hab license accept
          source metadata-linux/last_build.env
          echo "--- Promoting Linux package: $pkg_ident"
          echo "--- From channel: LTS-2024-current"
          echo "--- To channel: LTS-2024"
          hab pkg promote --auth $HAB_AUTH_TOKEN $pkg_ident LTS-2024
          echo "--- Linux promotion complete!"

      - name: Promote Windows Package to LTS-2024
        shell: bash
        run: |
          # Extract pkg_ident from PowerShell metadata file
          PKG_IDENT=$(grep -oP '(?<=\$pkg_ident = ")[^"]+' metadata-windows/last_build.ps1)
          echo "--- Promoting Windows package: $PKG_IDENT"
          echo "--- From channel: LTS-2024-current"
          echo "--- To channel: LTS-2024"
          hab pkg promote --auth $HAB_AUTH_TOKEN $PKG_IDENT LTS-2024
          echo "--- Windows promotion complete!"
