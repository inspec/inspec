name: Verify Pipeline

on:
  pull_request:
  push:
    branches:
      - inspec-5

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        ruby: ['3.1.7']
        task: [lint, test, isolated]
        exclude:
          - os: windows-latest
            task: lint
          - os: windows-latest
            task: isolated

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run lint
        if: matrix.task == 'lint' && matrix.os == 'ubuntu-latest'
        run: bundle exec rake test:lint

      - name: Run tests (Linux)
        if: matrix.task == 'test' && matrix.os == 'ubuntu-latest'
        run: |
          chmod +x .github/scripts/verify.sh
          .github/scripts/verify.sh

      - name: Run tests (Windows)
        if: matrix.task == 'test' && matrix.os == 'windows-latest'
        shell: powershell
        run: .github/scripts/verify.ps1

      - name: Run isolated tests
        if: matrix.task == 'isolated' && matrix.os == 'ubuntu-latest'
        env:
          RAKE_TASK: test:isolated
        run: |
          chmod +x .github/scripts/verify.sh
          .github/scripts/verify.sh
