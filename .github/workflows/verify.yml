name: Verify Pipeline

on:
  pull_request:
  push:
    branches:
      - inspec-5

jobs:
  lint:
    name: Lint Ruby Code
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1.7'
          bundler-cache: true

      - name: Run lint
        run: bundle exec rake test:lint

  test-linux:
    name: Tests - Linux
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1.7'
          bundler-cache: true

      - name: Configure bundle
        run: |
          bundle config --local path vendor/bundle
          bundle config set --local without deploy kitchen

      - name: Install dependencies
        run: bundle install --jobs=7 --retry=3

      - name: Run tests
        run: bundle exec rake

  test-isolated:
    name: Isolated Tests - Linux
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1.7'
          bundler-cache: true

      - name: Configure bundle
        run: |
          bundle config --local path vendor/bundle
          bundle config set --local without deploy kitchen

      - name: Install dependencies
        run: bundle install --jobs=7 --retry=3

      - name: Run isolated tests
        run: bundle exec rake test:isolated

  test-windows:
    name: Tests - Windows
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1.7'
          bundler-cache: true

      - name: Configure bundle
        shell: powershell
        run: bundle config set --local without deploy kitchen

      - name: Install dependencies
        shell: powershell
        run: bundle install --jobs=7 --retry=3

      - name: Run tests
        shell: powershell
        run: |
          bundle exec rake
          exit $LASTEXITCODE
