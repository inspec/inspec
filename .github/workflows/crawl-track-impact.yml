name: Crawl+Walk Track — Tests, Lint, Coverage, Contracts, Security & Diagram Validation

# Runs on learn/crawl/** and learn/walk/** branches.
# Job 1: standalone impact.rb unit tests (no bundler)
# Job 2: lint — RuboCop 1.86.2 (pinned, Walk Ex7+)
# Job 3: secret scan — gitleaks (Walk Ex8+)
# Job 4: coverage baseline for impact.rb (Walk Ex2+)
# Job 5: contract tests — golden file + API shape (Walk Ex5+)
# Job 6: architecture diagram structural validation
#
# Gem version pins (Walk Ex7):
#   minitest ~> 6.0  (upgrade from 5.27 used by main bundle; deliberate)
#   rubocop  1.86.2  (patch upgrade from 1.86.1)
#   simplecov ~> 0.22

on:
  push:
    branches:
      - "learn/crawl/**"
      - "learn/walk/**"
  pull_request:
    branches:
      - "learn/crawl/**"
      - "learn/walk/**"
      - main
  workflow_dispatch:

jobs:
  impact-tests:
    name: "impact.rb unit tests (Ruby ${{ matrix.ruby }})"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby: ["3.1", "3.2", "3.3"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: false   # no bundler needed for standalone tests

      - name: Install minitest (pinned ~> 6.0, Walk Ex7)
        run: gem install minitest -v '~> 6.0' --no-document

      - name: Run crawl-track-test.sh
        run: |
          RUBY_BIN=$(which ruby) bash scripts/crawl-track-test.sh

      - name: Annotate on failure
        if: failure()
        run: echo "::error file=lib/inspec/impact.rb::crawl-track tests failed — see job log"

  contract-tests:
    name: "Contract tests — impact API (Ruby ${{ matrix.ruby }})"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby: ["3.1", "3.2", "3.3"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: false

      - name: Install minitest (pinned ~> 6.0, Walk Ex7)
        run: gem install minitest -v '~> 6.0' --no-document

      - name: Run contract tests
        run: ruby -I lib test/contract/impact_contract_test.rb

      - name: Annotate on failure
        if: failure()
        run: |
          echo "::error file=lib/inspec/impact.rb::Contract test failed — IMPACT_SCORES or method shape changed."
          echo "::notice::If the change is intentional, run: ruby scripts/update-impact-contract.rb"

  secret-scan:
    name: "Secret scan — gitleaks (Walk Ex8)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for gitleaks git-mode scan

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # optional — required for org-level scans

      - name: Annotate on failure
        if: failure()
        run: |
          echo "::error::Gitleaks found potential secrets — review the scan output above."
          echo "::notice::If this is a false positive, add an allowlist entry to .gitleaks.toml"

  lint:
    name: "RuboCop lint (1.86.2 pinned, Walk Ex7)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install RuboCop (pinned 1.86.2)
        run: gem install rubocop -v '1.86.2' --no-document

      - name: Lint impact.rb and tests
        run: |
          rubocop lib/inspec/impact.rb \
                  test/unit/impact_test.rb \
                  test/contract/impact_contract_test.rb \
                  --format simple

      - name: Annotate on failure
        if: failure()
        run: echo "::error::RuboCop 1.86.2 offenses found — run rubocop --autocorrect locally"

  coverage-baseline:
    name: "Coverage baseline — impact.rb (Ruby ${{ matrix.ruby }})"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby: ["3.1", "3.2", "3.3"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: false

      - name: Install coverage gems (pinned versions, Walk Ex7)
        run: gem install minitest -v '~> 6.0' simplecov -v '~> 0.22' simplecov-json --no-document

      - name: Run coverage script
        run: ruby scripts/coverage-impact.rb

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-impact-ruby${{ matrix.ruby }}
          path: coverage/impact/

  diagram-validation:
    name: "Architecture diagram validation (Ruby ${{ matrix.ruby }})"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby: ["3.1", "3.2", "3.3"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: false

      - name: Validate architecture diagram
        run: ruby scripts/validate-diagram.rb

      - name: Annotate on failure
        if: failure()
        run: echo "::error file=ai-track-docs/architecture.mmd::Diagram validation failed — check cited paths or structure"

